<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Hierarchy Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-item { cursor: pointer; transition: all 0.2s ease; border-left: 2px solid transparent; }
        .nav-item:hover { background: rgba(59, 130, 246, 0.1); border-left-color: rgba(59, 130, 246, 0.5); padding-left: 1rem; }
        .nav-item.active { background: rgba(59, 130, 246, 0.2); border-left-color: #3b82f6; padding-left: 1.25rem; font-weight: bold; color: #60a5fa; }
        .column-border { border-right: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <nav class="glass border-b border-slate-800 flex-none">
        <div class="max-w-[1600px] mx-auto px-6">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"></path></svg>
                    </div>
                    <span class="text-2xl font-bold tracking-tight text-white">CarChat <span class="text-blue-500 text-sm font-medium ml-1">Explorer</span></span>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="flex items-center bg-slate-800 rounded-xl px-4 py-1 border border-slate-700">
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mr-3">Target Year</span>
                        <input type="text" id="targetYear" placeholder="e.g. 2024" class="bg-transparent border-none outline-none text-white text-sm w-20 font-bold placeholder:text-slate-600">
                    </div>
                    <button id="startBtn" onclick="startExtraction()" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold transition-all flex items-center shadow-lg shadow-blue-900/40">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Start Scraper
                    </button>
                    <button onclick="window.location.reload()" class="p-2.5 text-slate-400 hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div id="statusMsg" class="max-w-7xl mx-auto mt-2 hidden p-3 rounded-xl text-xs font-medium flex-none"></div>

    <main class="flex-1 flex min-h-0 overflow-hidden">
        <!-- Year Column -->
        <div class="w-40 column-border overflow-y-auto p-4 bg-slate-900/50 scroll-smooth">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 px-2 sticky top-0 bg-[#0f172a] py-1">Year</h3>
            <div id="yearList" class="space-y-1">
                {% for year in years %}
                <div class="nav-item px-3 py-2 rounded-lg text-sm font-medium text-slate-300" onclick="loadMakes('{{ year }}', this)">{{ year }}</div>
                {% endfor %}
            </div>
        </div>

        <!-- Make Column -->
        <div class="w-56 column-border overflow-y-auto p-4 scroll-smooth">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 px-2 sticky top-0 bg-[#0f172a] py-1">Make</h3>
            <div id="makeList" class="space-y-1">
                <div class="text-xs text-slate-600 px-2 italic">Select year...</div>
            </div>
        </div>

        <!-- Model Column -->
        <div class="w-64 column-border overflow-y-auto p-4 bg-slate-900/30 scroll-smooth">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 px-2 sticky top-0 bg-[#0f172a] py-1">Model</h3>
            <div id="modelList" class="space-y-1">
                <div class="text-xs text-slate-600 px-2 italic">Select make...</div>
            </div>
        </div>

        <!-- Engine Column -->
        <div class="w-64 column-border overflow-y-auto p-4 scroll-smooth">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 px-2 sticky top-0 bg-[#0f172a] py-1">Engine</h3>
            <div id="engineList" class="space-y-1">
                <div class="text-xs text-slate-600 px-2 italic">Select model...</div>
            </div>
        </div>

        <!-- Submodel & Link Column -->
        <div class="flex-1 overflow-y-auto p-4 bg-slate-900/50 scroll-smooth">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 px-2 sticky top-0 bg-[#0f172a] py-1">Submodel & Options</h3>
            <div id="submodelList" class="space-y-3">
                <div class="text-xs text-slate-600 px-2 italic">Select engine...</div>
            </div>
        </div>
    </main>

    <script>
        let selectedYear = '';
        let selectedMake = '';
        let selectedModel = '';
        let selectedEngine = '';

        async function loadMakes(year, el) {
            selectedYear = year;
            updateActive('yearList', el);
            clearLists(['makeList', 'modelList', 'engineList', 'submodelList']);
            
            const list = document.getElementById('makeList');
            list.innerHTML = '<div class="text-xs text-blue-500 px-2 animate-pulse">Loading makes...</div>';
            
            const res = await fetch(`/api/makes/${year}`);
            const data = await res.json();
            
            list.innerHTML = '';
            data.forEach(make => {
                const div = document.createElement('div');
                div.className = 'nav-item px-3 py-2 rounded-lg text-sm font-medium text-slate-300';
                div.textContent = make;
                div.onclick = (e) => loadModels(make, div);
                list.appendChild(div);
            });
        }

        async function loadModels(make, el) {
            selectedMake = make;
            updateActive('makeList', el);
            clearLists(['modelList', 'engineList', 'submodelList']);
            
            const list = document.getElementById('modelList');
            list.innerHTML = '<div class="text-xs text-blue-500 px-2 animate-pulse">Loading models...</div>';
            
            const res = await fetch(`/api/models/${selectedYear}/${make}`);
            const data = await res.json();
            
            list.innerHTML = '';
            data.forEach(model => {
                const div = document.createElement('div');
                div.className = 'nav-item px-3 py-2 rounded-lg text-sm font-medium text-slate-300';
                div.textContent = model;
                div.onclick = (e) => loadEngines(model, div);
                list.appendChild(div);
            });
        }

        async function loadEngines(model, el) {
            selectedModel = model;
            updateActive('modelList', el);
            clearLists(['engineList', 'submodelList']);
            
            const list = document.getElementById('engineList');
            list.innerHTML = '<div class="text-xs text-blue-500 px-2 animate-pulse">Loading engines...</div>';
            
            const res = await fetch(`/api/engines/${selectedYear}/${selectedMake}/${model}`);
            const data = await res.json();
            
            list.innerHTML = '';
            data.forEach(engine => {
                const div = document.createElement('div');
                div.className = 'nav-item px-3 py-2 rounded-lg text-sm font-medium text-slate-300';
                div.textContent = engine;
                div.onclick = (e) => loadSubmodels(engine, div);
                list.appendChild(div);
            });
        }

        async function loadSubmodels(engine, el) {
            selectedEngine = engine;
            updateActive('engineList', el);
            clearLists(['submodelList']);
            
            const list = document.getElementById('submodelList');
            list.innerHTML = '<div class="text-xs text-blue-500 px-2 animate-pulse">Loading configurations...</div>';
            
            const res = await fetch(`/api/submodels/${selectedYear}/${selectedMake}/${selectedModel}/${engine}`);
            const data = await res.json();
            
            list.innerHTML = '';
            data.forEach(v => {
                const a = document.createElement('a');
                a.href = `/vehicle/${v.id}`;
                a.className = 'block p-4 rounded-xl bg-slate-800/50 border border-slate-700 hover:border-blue-500/50 hover:bg-slate-800 transition-all group';
                a.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Submodel</span>
                            <span class="text-lg font-bold text-white group-hover:text-blue-400">${v.submodel}</span>
                        </div>
                        <div class="text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>
                `;
                list.appendChild(a);
            });
        }

        function updateActive(listId, el) {
            document.getElementById(listId).querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function clearLists(listIds) {
            listIds.forEach(id => {
                document.getElementById(id).innerHTML = `<div class="text-xs text-slate-600 px-2 italic">Select parent...</div>`;
            });
        }

        async function startExtraction() {
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('statusMsg');
            const year = document.getElementById('targetYear').value;
            
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-4 w-4 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Initializing...';

            try {
                const response = await fetch('/api/scrape', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ year: year })
                });
                const result = await response.json();
                
                status.classList.remove('hidden', 'bg-red-900/20', 'text-red-400', 'bg-green-900/20', 'text-green-400');
                if (response.ok) {
                    status.classList.add('bg-green-900/20', 'text-green-400', 'border', 'border-green-500/20');
                    status.textContent = result.message + '. Refresh in a few minutes.';
                } else {
                    status.classList.add('bg-red-900/20', 'text-red-400', 'border', 'border-red-500/20');
                    status.textContent = 'Error: ' + (result.detail || 'Failed to start');
                }
            } catch (err) {
                status.classList.remove('hidden');
                status.classList.add('bg-red-900/20', 'text-red-400');
                status.textContent = 'Network error: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Start Scraper';
            }
        }
    </script>
</body>
</html>
